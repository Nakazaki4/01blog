<nav class="navbar">
  <div class="navbar-inner">
    <a class="brand" routerLink="/" aria-label="Home">
      <span class="gradient-text">01blog</span>
    </a>

    @if (isAuthenticated()) {
      <div class="actions">
        <button
          mat-icon-button
          type="button"
          class="nav-icon"
          (click)="openCreatePost()"
          aria-label="Create post">
          <mat-icon>add_circle</mat-icon>
        </button>

        <button
          mat-icon-button
          type="button"
          class="nav-icon"
          [matMenuTriggerFor]="notifMenu"
          #notifTrigger="matMenuTrigger"
          (menuOpened)="onBellOpened()"
          [matBadge]="unreadCount()"
          [matBadgeHidden]="unreadCount() === 0"
          matBadgeColor="warn"
          matBadgeSize="small"
          aria-label="Notifications">
          <mat-icon>notifications</mat-icon>
        </button>

        <mat-menu #notifMenu="matMenu" class="notif-menu" xPosition="before">
          <div class="notif-header" (click)="$event.stopPropagation()">
            <span class="notif-title">Notifications</span>
            @if (unreadCount() > 0) {
              <button
                type="button"
                class="notif-mark-all"
                (click)="markAllRead(); $event.stopPropagation()">
                Mark all read
              </button>
            }
          </div>

          @if (loading()) {
            <div class="notif-loading">
              <mat-spinner diameter="24" />
            </div>
          } @else if (loadError()) {
            <p class="notif-empty">{{ loadError() }}</p>
          } @else if (items().length === 0) {
            <p class="notif-empty">No notifications yet.</p>
          } @else {
            <div class="notif-list">
              @for (item of items(); track item.id) {
                <button
                  type="button"
                  class="notif-item"
                  [class.unread]="!item.isRead"
                  (click)="onItemClick(item, notifTrigger)">
                  <mat-icon class="notif-icon">{{ iconFor(item.type) }}</mat-icon>
                  <div class="notif-body">
                    <p class="notif-text">
                      <strong>{{ item.actor.username }}</strong>
                      {{ messageFor(item) }}
                    </p>
                    <time class="notif-time">{{ item.createdAt | date: 'short' }}</time>
                  </div>
                  @if (!item.isRead) {
                    <span class="notif-dot" aria-hidden="true"></span>
                  }
                </button>
              }
            </div>
          }
        </mat-menu>

        <button
          mat-icon-button
          type="button"
          class="nav-icon"
          (click)="goToProfile()"
          aria-label="Profile">
          <mat-icon>person</mat-icon>
        </button>
      </div>
    }
  </div>
</nav>
