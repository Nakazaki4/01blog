<div class="auth-shell">
  <section class="auth-card">
    <div>
      <h1>Welcome <span class="gradient-text">back</span></h1>
      <p class="subtitle">Log in to continue to your feed.</p>
    </div>

    <form (submit)="submit(); $event.preventDefault()">
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input matInput type="text" [(ngModel)]="username" name="username" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" name="password" required>
      </mat-form-field>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button mat-raised-button color="primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Logging in...' : 'Log in' }}
      </button>
    </form>

    <p class="footer">No account? <a routerLink="/register">Register</a></p>
  </section>
</div>
